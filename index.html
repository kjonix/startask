<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Stepster ⭐</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; background: #1a1a2e; color: #fff; overflow-x: hidden; }

.splash { position:fixed; inset:0; background:linear-gradient(160deg,#0d0d1f 0%,#1a1a2e 50%,#0f0a2e 100%); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:9999; transition:opacity 0.5s ease; padding:2rem; text-align:center; }
.splash.hide { opacity:0; pointer-events:none; }
.splash-mascot { width:180px; height:180px; object-fit:contain; animation:floatBig 3s ease-in-out infinite; filter:drop-shadow(0 0 40px rgba(249,215,28,0.5)); margin-bottom:1.5rem; }
@keyframes floatBig { 0%,100%{transform:translateY(0) rotate(-2deg);} 50%{transform:translateY(-14px) rotate(2deg);} }
.splash h1 { font-size:3rem; font-weight:900; background:linear-gradient(135deg,#f9d71c,#ff6b6b,#c77dff); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin-bottom:0.5rem; }
.splash .slogan { font-size:1.1rem; color:#aaa; letter-spacing:1px; margin-bottom:2.5rem; }
.splash-btns { display:flex; flex-direction:column; gap:12px; width:100%; max-width:320px; }
.btn-splash-main { background:linear-gradient(135deg,#f9d71c,#ff8c42); color:#1a1a2e; font-weight:800; font-size:1.1rem; padding:15px; border-radius:50px; border:none; cursor:pointer; box-shadow:0 4px 20px rgba(249,215,28,0.3); transition:transform 0.15s; }
.btn-splash-main:active { transform:scale(0.97); }
.btn-splash-about { background:transparent; color:#888; font-size:0.88rem; padding:10px; border:none; cursor:pointer; text-decoration:underline; }

.spark { position:fixed; pointer-events:none; font-size:1rem; animation:sparkle 4s ease-in-out infinite; opacity:0.35; }
@keyframes sparkle { 0%,100%{opacity:0.15;transform:scale(0.8);} 50%{opacity:0.6;transform:scale(1.2);} }

.logo { text-align:center; padding:1.2rem 1rem 0.4rem; }
.logo h1 { font-size:2rem; font-weight:800; background:linear-gradient(135deg,#f9d71c,#ff6b6b,#c77dff); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.logo p { color:#888; font-size:0.82rem; margin-top:3px; }

.view { max-width:520px; margin:0 auto; padding:0 1rem 5rem; }
.card { background:#16213e; border-radius:16px; padding:1.1rem; margin-bottom:0.9rem; border:1px solid #0f3460; }
.card h2 { font-size:0.95rem; color:#c77dff; margin-bottom:0.8rem; display:flex; align-items:center; gap:6px; }

input[type=text], input[type=number], input[type=email] {
  background:#0f3460; border:1px solid #1a4a8a; border-radius:10px;
  padding:9px 12px; color:#fff; font-size:0.9rem; outline:none; width:100%;
}
input:focus { border-color:#c77dff; }
input::placeholder { color:#555; }
.row { display:flex; gap:8px; align-items:center; }
.row input { flex:1; }

/* ── 24-TIMERS KLOKKEVELGER ── */

.time-picker select { background:#0f3460; border:none; color:#fff; font-size:1.5rem; font-weight:800; outline:none; cursor:pointer; -webkit-appearance:none; appearance:none; text-align:center; width:56px; }
.time-picker select option { background:#16213e; }
.time-sep { font-size:1.8rem; font-weight:800; color:#c77dff; line-height:1; }

.btn { border:none; border-radius:10px; padding:9px 16px; font-size:0.9rem; font-weight:600; cursor:pointer; transition:transform 0.12s; }
.btn:active { transform:scale(0.96); }
.btn-purple { background:#7c3aed; color:#fff; }
.btn-gray   { background:#0f3460; color:#aaa; }
.btn-gold   { background:linear-gradient(135deg,#f9d71c,#ff8c42); color:#1a1a2e; font-weight:800; }
.btn-gold:disabled { opacity:0.35; cursor:default; transform:none; }
.btn-sm   { padding:6px 12px; font-size:0.8rem; border-radius:8px; }
.btn-full { width:100%; margin-top:0.5rem; border-radius:14px; padding:13px; font-size:1rem; }
.btn-add  { background:#c77dff; border-radius:10px; width:38px; height:38px; display:flex; align-items:center; justify-content:center; font-size:1.3rem; color:#fff; cursor:pointer; border:none; flex-shrink:0; }

.btn-share { background:linear-gradient(135deg,#7c3aed,#c77dff); color:#fff; font-weight:700; border:none; border-radius:10px; padding:9px 16px; font-size:0.9rem; cursor:pointer; display:flex; align-items:center; gap:6px; transition:transform 0.12s; box-shadow:0 3px 12px rgba(124,58,237,0.4); }
.btn-share:active { transform:scale(0.96); }
.btn-reset { background:#1a0a0a; border:1.5px solid #7f1d1d; color:#fca5a5; border-radius:12px; padding:10px 20px; font-size:0.88rem; font-weight:600; cursor:pointer; transition:transform 0.12s; }
.btn-reset:active { transform:scale(0.96); }

.emoji-row { display:flex; gap:5px; flex-wrap:wrap; margin-bottom:8px; }
.ep { background:#0f3460; border:1.5px solid transparent; border-radius:8px; width:34px; height:34px; display:flex; align-items:center; justify-content:center; font-size:1.15rem; cursor:pointer; }
.ep.sel { border-color:#c77dff; background:#1a0a3a; }

.task-list { list-style:none; display:flex; flex-direction:column; gap:6px; margin-top:0.6rem; }
.task-item { display:flex; align-items:center; background:#0f3460; border-radius:10px; padding:9px 11px; gap:8px; }

.prog-bg { background:#0f3460; border-radius:20px; height:16px; overflow:hidden; }

.prog-txt { text-align:right; font-size:0.78rem; color:#888; margin-top:3px; }

.pstat-task { display:flex; align-items:center; background:#16213e; border-radius:12px; padding:11px 14px; gap:10px; border:1.5px solid transparent; margin-bottom:7px; }
.pstat-task.done { border-color:#10b981; background:#0d2418; }
.pstat-task.done .ptn { text-decoration:line-through; color:#555; }

.list-item { background:#16213e; border-radius:14px; padding:1rem 1.1rem; display:flex; align-items:center; gap:12px; border:1.5px solid #0f3460; cursor:pointer; margin-bottom:10px; transition:border 0.2s; }
.list-item:hover { border-color:#7c3aed; }
.list-icon { font-size:2rem; }
.list-info { flex:1; }
.list-name { font-size:1rem; font-weight:700; }
.list-meta { font-size:0.78rem; color:#888; margin-top:3px; }
.list-arrow { color:#555; font-size:1.2rem; }

.done-screen { text-align:center; padding:2rem 1.5rem; }
.done-mascot { width:120px; animation:floatBig 3s ease-in-out infinite; filter:drop-shadow(0 0 20px rgba(249,215,28,0.5)); margin-bottom:1rem; }
.done-screen h2 { font-size:2rem; font-weight:900; color:#f9d71c; margin-bottom:0.5rem; }
.done-screen .done-margin { font-size:1.1rem; font-weight:700; margin:0.8rem 0; }
.done-screen .done-margin.on-time { color:#10b981; }
.done-screen .done-margin.late    { color:#ef4444; }
.done-screen p { color:#aaa; font-size:0.9rem; margin-bottom:1.5rem; }

.child-header { padding:1.5rem 1rem 1.2rem; text-align:center; transition:background 0.5s; }
.child-header.green   { background:linear-gradient(135deg,#065f46,#10b981); }
.child-header.red     { background:linear-gradient(135deg,#7f1d1d,#ef4444); }
.child-header.over    { background:linear-gradient(135deg,#3b0764,#7c3aed); }
.child-header.done-bg { background:linear-gradient(135deg,#1a1a0a,#3a3a00); }
.child-header h1 { font-size:1.8rem; font-weight:800; margin-bottom:0.3rem; }
.child-header .mascot-sm { width:50px; margin-bottom:0.4rem; filter:drop-shadow(0 0 10px rgba(249,215,28,0.4)); }
.child-header .greeting { color:rgba(255,255,255,0.85); font-size:0.92rem; margin-bottom:0.5rem; }
.stars-row { font-size:1.1rem; margin-top:0.3rem; color:#f9d71c; letter-spacing:3px; }

.countdown-widget { max-width:520px; margin:0 auto; padding:1rem 1rem 0; }
.cw-main { border-radius:16px; padding:1.3rem 1.4rem; display:flex; align-items:center; gap:1.2rem; }

.cw-main.red   { background:#2a0a0a; border:2px solid #ef4444; }
.cw-main.over  { background:#1a0a2e; border:2px solid #c77dff; }
.cw-time { font-size:2.6rem; font-weight:800; font-variant-numeric:tabular-nums; min-width:120px; line-height:1; }
.cw-main.green .cw-time { color:#10b981; }
.cw-main.red   .cw-time { color:#ef4444; }

.cw-info { flex:1; display:flex; flex-direction:column; gap:5px; }
.cw-label  { font-size:0.78rem; color:#aaa; }
.cw-status { font-size:0.95rem; font-weight:700; }
.cw-main.green .cw-status { color:#10b981; }
.cw-main.red   .cw-status { color:#ef4444; }
.cw-main.over  .cw-status { color:#c77dff; }
.cw-tasks { font-size:0.82rem; color:#888; }

.no-tasks { text-align:center; padding:3rem 1.5rem; }
.no-tasks .nt-icon { font-size:4rem; margin-bottom:1rem; }
.no-tasks h2 { font-size:1.3rem; font-weight:800; color:#888; }
.no-tasks p { color:#555; font-size:0.9rem; margin-top:8px; line-height:1.5; }

.child-task { background:#16213e; border-radius:20px; padding:16px 18px; display:flex; align-items:center; gap:14px; border:2px solid #0f3460; transition:all 0.3s; cursor:pointer; margin-bottom:12px; }
.child-task.locked { cursor:default; opacity:0.7; }
.child-task:not(.locked):active { transform:scale(0.97); }
.child-task.done { background:#0b2018; border-color:#10b981; }
.child-task.done .ct-name { text-decoration:line-through; color:#555; }
.child-task.next-up { border-color:#f9d71c; }
.ct-emoji { font-size:2rem; }
.ct-info { flex:1; min-width:0; }
.ct-name { font-size:1.05rem; font-weight:700; }
.ct-sub { font-size:0.8rem; color:#888; margin-top:3px; }
.ct-check { width:38px; height:38px; border-radius:50%; border:2.5px solid #333; display:flex; align-items:center; justify-content:center; font-size:1.3rem; transition:all 0.3s; flex-shrink:0; }
.child-task.done .ct-check { background:#10b981; border-color:#10b981; }

.login-wrap { max-width:400px; margin:0 auto; padding:2rem 1.5rem 5rem; }
.login-logo { text-align:center; padding:1.5rem 0 1.2rem; }
.login-logo img { width:70px; margin-bottom:0.6rem; filter:drop-shadow(0 0 15px rgba(249,215,28,0.35)); }
.login-logo h1 { font-size:2.2rem; font-weight:900; background:linear-gradient(135deg,#f9d71c,#ff6b6b,#c77dff); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.login-logo p { color:#888; font-size:0.88rem; margin-top:5px; }
.pin-dots { display:flex; gap:10px; justify-content:center; margin:1rem 0; }
.pin-dot { width:16px; height:16px; border-radius:50%; border:2px solid #555; transition:all 0.2s; }
.pin-dot.filled { background:#c77dff; border-color:#c77dff; }
.pin-pad { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:1rem; }
.pin-btn { background:#16213e; border:1px solid #0f3460; border-radius:14px; padding:16px; font-size:1.3rem; font-weight:700; color:#fff; cursor:pointer; text-align:center; transition:background 0.15s; }

.week-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:6px; margin-top:0.6rem; }

.day-label { font-size:0.68rem; color:#888; margin-bottom:4px; }
.day-stars-on   { font-size:0.82rem; color:#f9d71c; font-weight:700; min-height:1.1em; }
.day-stars-late { font-size:0.82rem; color:#f59e0b; opacity:0.6; min-height:1.1em; }
.day-cell.today { border:1.5px solid #c77dff; }
.stat-row { display:flex; gap:8px; margin-bottom:0.6rem; }
.stat-box { flex:1; background:#0f3460; border-radius:10px; padding:10px; text-align:center; }
.stat-num { font-size:1.4rem; font-weight:800; color:#f9d71c; }
.stat-lbl { font-size:0.72rem; color:#888; margin-top:2px; }
.legend { display:flex; gap:14px; margin-top:8px; font-size:0.78rem; color:#888; justify-content:center; }

.comp-item { display:flex; align-items:center; background:#16213e; border-radius:12px; padding:11px 14px; gap:12px; border:1.5px solid #0f3460; margin-bottom:8px; }
.comp-item.on-time { border-color:#10b981; }
.comp-item.late    { border-color:#ef4444; }
.comp-icon { font-size:1.5rem; flex-shrink:0; }
.comp-info { flex:1; }
.comp-date { font-size:0.88rem; font-weight:700; }
.comp-tasks { font-size:0.75rem; color:#888; margin-top:2px; }
.comp-margin { font-size:0.9rem; font-weight:800; }
.comp-item.on-time .comp-margin { color:#10b981; }
.comp-item.late    .comp-margin { color:#ef4444; }

.bnav { position:fixed; bottom:0; left:0; right:0; background:#16213e; border-top:1px solid #0f3460; display:flex; z-index:100; }
.bnav-btn { flex:1; padding:10px 6px; background:none; border:none; color:#666; font-size:0.72rem; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:2px; }
.bnav-btn.active { color:#c77dff; }
.bnav-icon { font-size:1.2rem; }

.cp { position:fixed; width:9px; height:9px; top:-10px; animation:cf linear forwards; z-index:9999; border-radius:2px; pointer-events:none; }
@keyframes cf { to{transform:translateY(110vh) rotate(720deg);opacity:0} }

.loading { text-align:center; padding:3rem 1rem; color:#888; }

@keyframes spin { to{transform:rotate(360deg)} }

.error-box   { background:#2a0a0a; border:1px solid #ff6b6b; border-radius:12px; padding:1rem; margin:0.5rem 0; color:#ff9999; font-size:0.88rem; }
.success-box { background:#0a2a1a; border:1px solid #10b981; border-radius:12px; padding:0.8rem 1rem; margin:0.5rem 0; color:#6ee7b7; font-size:0.85rem; }

.section-lbl { font-size:0.75rem; color:#888; margin-bottom:5px; display:block; }

<div class="spark" style="top:80%;right:5%;animation-delay:0.7s">✨</div>

<div class="splash" id="splash">
  <img src="mascot.png" class="splash-mascot" alt="Stepster">
  <h1>Stepster</h1>
  <div class="slogan">Din venn i hverdagen</div>
  <div class="splash-btns">
    <button class="btn-splash-main" onclick="hideSplash(false)">Kom i gang ⭐</button>
    <button class="btn-splash-about" onclick="window.location.href='om.html'">Hva er Stepster?</button>
  </div>

<div id="app"></div>

<script>
// ════════════════════════════════════════════════════
const API_URL = 'https://startask-api-gcb3cke7bagha3fu.norwayeast-01.azurewebsites.net/api/api';
// ════════════════════════════════════════════════════

const EMOJIS = ['🦷','👕','🎒','🥣','👟','🛁','🚿','📚','🥤','😴','🧴','🧦','🍎','🎨','🧹'];
const QUICK  = [{e:'🦷',n:'Pusse tenner',m:3},{e:'👕',n:'Kle på deg',m:5},{e:'🥣',n:'Spise frokost',m:10},{e:'🎒',n:'Pakke sekken',m:5},{e:'👟',n:'Ta på sko',m:2}];
const DAYS   = ['Man','Tir','Ons','Tor','Fre','Lør','Søn'];
const GRACE_MINUTES = 30;
const HOURS  = Array.from({length:24},(_,i)=>i.toString().padStart(2,'0'));
const MINS   = Array.from({length:12},(_,i)=>(i*5).toString().padStart(2,'0'));

const S = {
  view:'login', loginTab:'login',
  pinInput:'', emailInput:'',
  userId:null,
  lists:[], activeRoom:null,
  tasks:[], checkedIds:{},
  locked:false, completionMarginSec:null,
  taskInput:'', taskMins:5, taskEmoji:'⭐',
  deadlineHour:'07', deadlineMin:'30',
  showNewList:false, childName:'',
  deadline:null,
  listKey:null, childKey:null,
  weekStats:[], completions:[],
  pollInterval:null, tickInterval:null,
  lastMinuteTick:-1,
  saving:false, loading:false, error:null, ok:null,
};

function hideSplash(instant){const el=document.getElementById('splash');if(instant){el.style.display='none';return;}el.classList.add('hide');setTimeout(()=>el.style.display='none',500);}
function lsGet(k){try{return localStorage.getItem(k);}catch(e){return null;}}
function lsSet(k,v){try{localStorage.setItem(k,v);}catch(e){}}
function saveSession(){lsSet('sp_uid',String(S.userId));}
function loadSession(){return lsGet('sp_uid');}

// ── DEADLINE — alltid 24-timers HH:MM ────────────────────────
function deadlineStr(){return `${S.deadlineHour}:${S.deadlineMin}`;}

function parseDeadline(dl) {
  if (!dl) return null;
  try {
    const d = new Date(dl);
    if (!isNaN(d.getTime()))
      return d.getUTCHours().toString().padStart(2,'0')+':'+d.getUTCMinutes().toString().padStart(2,'0');
    return String(dl).substring(0,5);
  } catch(e){return null;}
}

function setDeadlineFromStr(str) {
  if (!str) return;
  const parts = str.split(':');
  S.deadlineHour = (parts[0]||'07').padStart(2,'0');
  // Rund ned til nærmeste 5-minutt
  const m = parseInt(parts[1]||'30');
  S.deadlineMin = (Math.floor(m/5)*5).toString().padStart(2,'0');
}

function getDeadlineMs(dl) {
  if (!dl) return null;
  const [h,m] = dl.split(':').map(Number);
  const d = new Date();
  d.setHours(h,m,0,0);
  return d.getTime();
}

function getTimeStatus() {
  if (!S.deadline) return {state:'green',remSec:null};
  const now=Date.now(), dlMs=getDeadlineMs(S.deadline), graceMs=dlMs+GRACE_MINUTES*60000;
  if(now>graceMs)return{state:'expired',remSec:0};
  const remSec=Math.floor((dlMs-now)/1000);
  if(now>dlMs)return{state:'over',remSec:-Math.floor((now-dlMs)/1000)};
  const remainingSec=S.tasks.filter(t=>!S.checkedIds[t.id]).reduce((s,t)=>s+t.mins,0)*60;
  return{state:remSec>remainingSec?'green':'red',remSec};
}

function fmtTime(sec){const abs=Math.abs(Math.round(sec)),h=Math.floor(abs/3600),m=Math.floor((abs%3600)/60),s=abs%60;return h>0?`${h}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`:`${m}:${s.toString().padStart(2,'0')}`;}

function fmtMargin(sec){
  if(sec===null||sec===undefined)return'—';
  const abs=Math.abs(sec),m=Math.floor(abs/60),s=abs%60;
  const str=m>0?`${m} min${s>0?' '+s+' sek':''}`:s+' sek';
  return sec>=0?`+${str} igjen`:`-${str} over fristen`;
}

// Formater dato/tid i norsk 24-timers format
function fmtNorwegianDateTime(val){
  if(!val)return'—';
  try{
    const d=new Date(val);
    const date=d.toLocaleDateString('nb-NO',{day:'numeric',month:'short'});
    const h=d.getHours().toString().padStart(2,'0');
    const m=d.getMinutes().toString().padStart(2,'0');
    return`${date} kl. ${h}:${m}`;
  }catch(e){return String(val);}
}

function playMinuteTick(isRed){
  try{const ctx=new(AudioContext||webkitAudioContext)();
  if(isRed){[880,660,440].forEach((f,i)=>{const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=f;o.type='sine';g.gain.setValueAtTime(0.3,ctx.currentTime+i*0.1);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*0.1+0.15);o.start(ctx.currentTime+i*0.1);o.stop(ctx.currentTime+i*0.1+0.2);});}
  else{const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=523;o.type='sine';g.gain.setValueAtTime(0.1,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.3);o.start(ctx.currentTime);o.stop(ctx.currentTime+0.35);}
  }catch(e){}}

function checkMinuteTick(ts){
  if(S.locked||!S.deadline||ts.state==='expired'||ts.remSec===null)return;
  const cur=Math.floor(Math.abs(ts.remSec)/60);
  if(cur!==S.lastMinuteTick&&S.lastMinuteTick!==-1)playMinuteTick(ts.state==='red');
  S.lastMinuteTick=cur;
}

async function api(action,body,roomId,listKey){
  let url=`${API_URL}?action=${action}`;
  if(roomId)url+=`&room=${encodeURIComponent(roomId)}`;
  if(listKey)url+=`&childKey=${encodeURIComponent(listKey)}`;
  const res=await fetch(url,{method:body?'POST':'GET',headers:{'Content-Type':'application/json'},...(body?{body:JSON.stringify(body)}:{})});
  if(!res.ok){const err=await res.json().catch(()=>({}));throw new Error(err.error||`HTTP ${res.status}`);}
  return res.json();
}

async function loadRoom(roomId,listKey){
  const rows=await api('getRoom',null,roomId,listKey);
  if(!rows?.length)return false;
  S.childName=rows[0].child_name||'Barnet';
  S.deadline=parseDeadline(rows[0].deadline);
  const m={};
  rows.forEach(r=>{
    if(!r.task_id)return;
    if(!m[r.task_id])m[r.task_id]={id:r.task_id,name:r.task_name,emoji:r.emoji,mins:r.mins,order:r.sort_order};
    if(r.checked_at)S.checkedIds[r.task_id]=true;
  });
  S.tasks=Object.values(m).sort((a,b)=>a.order-b.order);
  if(S.tasks.length>0&&S.tasks.every(t=>S.checkedIds[t.id]))S.locked=true;
  return true;
}

function childLink(){const u=new URL(location.href.split('?')[0]);u.searchParams.set('listKey',S.listKey);return u.toString();}

async function shareChildLink(){
  const url=childLink(),name=S.childName||'deg',text=`Yo ${name}! 🦊 Stepster har en oppgaveliste til deg. Klikk her:`;
  if(navigator.share){try{await navigator.share({title:'Stepster ⭐',text,url});}catch(e){}}
  else{await navigator.clipboard.writeText(`${text}\n${url}`);S.ok='Lenke kopiert!';render();setTimeout(()=>{S.ok=null;render();},4000);}
}

  if     (S.view==='login')       app.innerHTML=tplLogin();
  else if(S.view==='lists')       app.innerHTML=tplLists();
  else if(S.view==='setup')       app.innerHTML=tplSetup();
  else if(S.view==='status')      app.innerHTML=tplStatus();
  else if(S.view==='child')       app.innerHTML=tplChild();
  else if(S.view==='stats')       app.innerHTML=tplStats();
  else if(S.view==='completions') app.innerHTML=tplCompletions();
}

function pinPress(n){
  if(S.pinInput.length>=4)return;
  const el=document.getElementById('email-input');if(el)S.emailInput=el.value;
  S.pinInput+=n;render();
  if(S.pinInput.length===4){if(S.loginTab==='login')doLogin();else doRegister();}
}
function pinDel(){S.pinInput=S.pinInput.slice(0,-1);render();}

async function doLogin(){
  if(!S.emailInput){S.error='Skriv inn epostadresse';S.pinInput='';render();return;}
  S.error=null;
  try{const r=await api('login',{email:S.emailInput,pin:S.pinInput});S.userId=r.userId;saveSession();await fetchLists();S.view='lists';render();}
  catch(e){S.error=e.message;S.pinInput='';render();}
}
async function doRegister(){
  if(!S.emailInput){S.error='Skriv inn epostadresse';S.pinInput='';render();return;}
  S.error=null;
  try{const r=await api('register',{email:S.emailInput,pin:S.pinInput});S.userId=r.userId;saveSession();S.lists=[];S.view='lists';render();}

function timePicker(hourId, minId, curHour, curMin){
  const hOpts=HOURS.map(h=>`<option value="${h}" ${h===curHour?'selected':''}>${h}</option>`).join('');
  const mOpts=MINS.map(m=>`<option value="${m}" ${m===curMin?'selected':''}>${m}</option>`).join('');
  return`<div class="time-picker">
    <select id="${hourId}" onchange="onTimeChange('${hourId}','${minId}')">${hOpts}</select>
    <span class="time-sep">:</span>
    <select id="${minId}" onchange="onTimeChange('${hourId}','${minId}')">${mOpts}</select>
  </div>`;
}

function onTimeChange(hourId, minId){
  const h=document.getElementById(hourId)?.value;
  const m=document.getElementById(minId)?.value;
  if(h)S.deadlineHour=h;
  if(m)S.deadlineMin=m;
}

function readTimePicker(hourId, minId){
  const h=document.getElementById(hourId)?.value;
  const m=document.getElementById(minId)?.value;
  if(h)S.deadlineHour=h;
  if(m)S.deadlineMin=m;
}

async function createList(){
  const name=document.getElementById('new-list-name')?.value?.trim();
  const childName=document.getElementById('new-child-name')?.value?.trim();
  readTimePicker('new-hour','new-min');
  if(!name){S.error='Skriv inn navn på listen';render();return;}
  if(!childName){S.error='Skriv inn barnets navn';render();return;}
  S.error=null;S.saving=true;
  try{
    await api('createList',{userId:S.userId,name,childName,deadline:deadlineStr()});
    S.showNewList=false;await fetchLists();S.saving=false;S.ok='Oppgaveliste opprettet!';render();
    setTimeout(()=>{S.ok=null;render();},3000);
  }catch(e){S.error=e.message;S.saving=false;render();}
}

async function openList(roomId){
  S.error=null;S.loading=true;S.checkedIds={};S.locked=false;S.completionMarginSec=null;
  S.activeRoom=S.lists.find(l=>l.id===roomId);
  S.listKey=S.activeRoom?.child_key;
  S.view='setup';render();
  try{
    await loadRoom(roomId,null);
    setDeadlineFromStr(S.deadline||'07:30');
    S.loading=false;render();
  }catch(e){S.error='Kunne ikke laste liste.';S.loading=false;render();}
}

function tplChild(){
  if(S.loading)return`<div class="loading"><div class="spin">⭐</div><p style="margin-top:1rem">Laster oppgaver...</p></div>`;
  const ts=getTimeStatus();
  checkMinuteTick(ts);

  if(ts.state==='expired')return`
    <div class="child-header over"><img src="mascot.png" class="mascot-sm" alt=""><h1>Stepster</h1><div class="greeting">Hei ${S.childName||''}!</div></div>
    <div class="view" style="padding-top:1rem">
      <div class="no-tasks"><div class="nt-icon">😴</div><h2>Ingen oppgaver akkurat nå</h2><p>Fristen for i dag er passert.<br>Foreldre legger ut nye oppgaver til i morgen!</p></div>
    </div>`;

  const done=S.tasks.filter(t=>S.checkedIds[t.id]).length;
  const allDone=done===S.tasks.length&&S.tasks.length>0;
  const remaining=S.tasks.filter(t=>!S.checkedIds[t.id]);
  const next=remaining[0];
  const cwState=S.locked?'done-bg':(ts.state==='over'?'over':ts.state);

  if(S.locked&&allDone){
    const onTime=S.completionMarginSec!==null&&S.completionMarginSec>=0;
    return`
      <div class="child-header ${onTime?'green':'red'}">
        <img src="mascot.png" class="mascot-sm" alt=""><h1>Stepster</h1>
        <div class="stars-row">${'⭐'.repeat(S.tasks.length)}</div>
      </div>
      <div class="view" style="padding-top:1rem">
        <div class="done-screen">
          <img src="mascot.png" class="done-mascot" alt="">
          <h2>🎉 Fantastisk!</h2>
          <p>Du er en ekte stjerne, ${S.childName||''}!</p>
          ${S.deadline&&S.completionMarginSec!==null?`<div class="done-margin ${onTime?'on-time':'late'}">${fmtMargin(S.completionMarginSec)}</div>`:''}
          <button class="btn-reset" onclick="resetDay()">🔄 Start på nytt</button>
          <p style="font-size:0.75rem;color:#555;margin-top:10px;line-height:1.6">
            Oppgavene nullstilles automatisk til i morgen.<br>
            «Start på nytt» brukes kun hvis du vil gjøre listen om igjen i dag.
          </p>
        </div>
        <div style="margin-top:1rem;">
          ${S.tasks.map(t=>`
            <div class="child-task done locked">
              <span class="ct-emoji">${t.emoji}</span>
              <div class="ct-info"><div class="ct-name">${t.name}</div></div>
              <div class="ct-check">✅</div>
            </div>`).join('')}
        </div>
      </div>
      <div class="bnav">
        <button class="bnav-btn active"><span class="bnav-icon">📋</span>Oppgaver</button>
        <button class="bnav-btn" onclick="goChildStats()"><span class="bnav-icon">⭐</span>Mine stjerner</button>
      </div>`;
  }

  let cwHtml='';
  if(S.deadline){
    const isOver=ts.state==='over',absSec=Math.abs(ts.remSec||0);
    const statusText=isOver?`⚠️ Fristen er passert!`:ts.state==='red'?`🔴 Du rekker det IKKE — skynd deg!`:`🟢 Du rekker det fint — bra jobbet!`;
    const remTaskText=remaining.length>0?`${remaining.length} oppgave${remaining.length>1?'r':''} igjen (${remaining.reduce((s,t)=>s+t.mins,0)} min)`:'🎉 Alle oppgaver er gjort!';
    cwHtml=`<div class="countdown-widget"><div class="cw-main ${ts.state==='over'?'over':ts.state}">
      <div class="cw-time">${isOver?'-':''}${fmtTime(absSec)}</div>
      <div class="cw-info">
        <div class="cw-label">Frist: ${S.deadline}</div>
        <div class="cw-status">${statusText}</div>
        <div class="cw-tasks">${remTaskText}</div>
      </div>
    </div></div>`;
  }

  const cards=S.tasks.map(t=>{
    const isDone=!!S.checkedIds[t.id],isNext=!isDone&&t===next;
    return`<div class="child-task ${isDone?'done':''} ${isNext&&!S.locked?'next-up':''} ${S.locked?'locked':''}" onclick="${S.locked?'':` toggleTask('${t.id}')`}">
      <span class="ct-emoji">${t.emoji}</span>
      <div class="ct-info"><div class="ct-name">${t.name}</div><div class="ct-sub">${t.mins} min${isNext&&!S.locked?' — neste!':''}</div></div>
      <div class="ct-check">${isDone?'✅':''}</div>
    </div>`;
  }).join('');

  return`
    <div class="child-header ${cwState}">
      <img src="mascot.png" class="mascot-sm" alt=""><h1>Stepster</h1>
      <div class="greeting">Hei ${S.childName||''}! Du klarer dette! 💪</div>
      <div class="stars-row">${'⭐'.repeat(done)}${'☆'.repeat(Math.max(0,S.tasks.length-done))}</div>
    </div>
    ${cwHtml}
    <div class="view" style="padding-top:0.8rem">
      ${cards}
      ${S.error?`<div class="error-box">⚠️ ${S.error}</div>`:''}
    </div>
    <div class="bnav">
      <button class="bnav-btn active"><span class="bnav-icon">📋</span>Oppgaver</button>
      <button class="bnav-btn" onclick="goChildStats()"><span class="bnav-icon">⭐</span>Mine stjerner</button>
    </div>`;
}

function tplStats(){
  const today=dateKey(new Date()),week=getWeekDays();
  const isChild=!!S.childKey;
  const totalOnTime=S.weekStats.reduce((s,d)=>s+(d.stars_on_time||0),0);
  const totalLate  =S.weekStats.reduce((s,d)=>s+(d.stars_late||0),0);
  const total=totalOnTime+totalLate;
  const bestDay=Math.max(0,...S.weekStats.map(d=>d.stars||0));
  const byDay={};
  S.weekStats.forEach(d=>{byDay[d.checked_at]={onTime:d.stars_on_time||0,late:d.stars_late||0};});
  const dayCells=week.map(d=>{
    const data=byDay[d.key]||{onTime:0,late:0};
    return`<div class="day-cell ${d.key===today?'today':''}">
      <div class="day-label">${d.label}</div>
      <div class="day-stars-on">${data.onTime>0?'⭐'.repeat(Math.min(data.onTime,5)):'—'}</div>
      <div class="day-stars-late">${data.late>0?'⏰'.repeat(Math.min(data.late,5)):''}</div>
    </div>`;
  }).join('');
  return`<div class="logo"><h1>Stepster ⭐</h1><p>${isChild?(S.childName||'')+'s statistikk':'Statistikk'}</p></div>
    <div class="view">
      <div class="card">
        <h2>📅 Denne uken</h2>
        <div class="week-grid">${dayCells}</div>
        <div class="legend"><span>⭐ I tide</span><span>⏰ Etter frist</span></div>
      </div>
      <div class="stat-row">
        <div class="stat-box"><div class="stat-num">${totalOnTime}</div><div class="stat-lbl">I tide ⭐</div></div>
        <div class="stat-box"><div class="stat-num">${totalLate}</div><div class="stat-lbl">Etter frist ⏰</div></div>
        <div class="stat-box"><div class="stat-num">${bestDay}</div><div class="stat-lbl">Beste dag</div></div>
      </div>
      <div class="card"><h2>🏆 Motivasjon</h2><p style="font-size:0.9rem;color:#ccc;line-height:1.6">${motMsg(totalOnTime,total)}</p></div>
    </div>
    <div class="bnav">
      <button class="bnav-btn" onclick="${isChild?'goChildTasks()':'goSetup()'}"><span class="bnav-icon">${isChild?'📋':'✏️'}</span>${isChild?'Oppgaver':'Rediger'}</button>
      ${!isChild?`<button class="bnav-btn" onclick="goStatus()"><span class="bnav-icon">👀</span>Status</button>`:''}
      <button class="bnav-btn active"><span class="bnav-icon">📈</span>Statistikk</button>
      ${!isChild?`<button class="bnav-btn" onclick="goCompletions()"><span class="bnav-icon">📓</span>Logg</button>`:''}
    </div>`;
}

function tplCompletions(){
  const items=S.completions.map(c=>{
    const onTime=c.margin_sec!==null&&c.margin_sec>=0;
    return`<div class="comp-item ${onTime?'on-time':'late'}">
      <div class="comp-icon">${onTime?'✅':'⏰'}</div>
      <div class="comp-info">
        <div class="comp-date">${fmtNorwegianDateTime(c.completed_at)}</div>
        <div class="comp-tasks">${c.tasks_done} av ${c.tasks_total} oppgaver${c.deadline?' · Frist '+c.deadline:''}</div>
      </div>
      <div class="comp-margin">${fmtMargin(c.margin_sec)}</div>
    </div>`;
  }).join('');
  return`<div class="logo"><h1>Stepster ⭐</h1><p>${S.activeRoom?.name||'Logg'}</p></div>
    <div class="view">
      <div class="card">
        <h2>📓 Fullføringslogg</h2>
        <p style="font-size:0.8rem;color:#888;margin-bottom:0.8rem">Viser de 30 siste fullføringene</p>
        ${S.completions.length?items:`<p class="muted" style="text-align:center;padding:1rem">Ingen fullføringer ennå</p>`}
      </div>
    </div>
    <div class="bnav">
      <button class="bnav-btn" onclick="goSetup()"><span class="bnav-icon">✏️</span>Rediger</button>
      <button class="bnav-btn" onclick="goStatus()"><span class="bnav-icon">👀</span>Status</button>
      <button class="bnav-btn" onclick="goStatsParent()"><span class="bnav-icon">📈</span>Statistikk</button>
      <button class="bnav-btn active"><span class="bnav-icon">📓</span>Logg</button>
    </div>`;
}

function dateKey(d){return d.toISOString().split('T')[0];}
function getWeekDays(){const t=new Date(),d=[];for(let i=6;i>=0;i--){const x=new Date(t);x.setDate(t.getDate()-i);d.push({key:dateKey(x),label:DAYS[x.getDay()===0?6:x.getDay()-1]});}return d;}
function motMsg(onTime,total){
  if(total===0)return'Start i dag og tjen din første stjerne! 💪';
  if(onTime>=total&&total>=5)return`Utrolig! ${onTime} stjerner i tide! Du er en ekte SuperHelt! 🦸`;
  if(onTime>0&&onTime>=total*0.8)return`Kjempebra! ${onTime} av ${total} stjerner kom i tide! 🌟`;
  if(total>=3)return`${total} oppgaver gjort! Prøv å få flere innenfor fristen! 💪`;
  return'Fortsett slik — du blir bedre for hver dag! ⭐';
}
function selEmoji(e){S.taskEmoji=e;render();}
function addTask(){const el=document.getElementById('ti');const n=(el?el.value:S.taskInput).trim();if(!n)return;S.tasks.push({id:Date.now().toString(),name:n,mins:S.taskMins,emoji:S.taskEmoji});S.taskInput='';render();}
function quickAdd(e,n,m){S.tasks.push({id:Date.now().toString(),name:n,mins:m,emoji:e});render();}
function removeTask(i){S.tasks.splice(i,1);render();}
function doLogout(){lsSet('sp_uid','');S.userId=null;S.view='login';S.emailInput='';S.pinInput='';S.error=null;stopIntervals();render();}

async function saveAndLink(){
  S.error=null;S.saving=true;
  readTimePicker('dl-hour','dl-min');
  render();
  try{
    await api('saveRoom',{roomId:S.activeRoom.id,tasks:S.tasks,deadline:deadlineStr(),childName:S.childName,name:S.activeRoom.name});
    S.deadline=deadlineStr();
    S.ok='Lagret!';S.saving=false;render();
    setTimeout(()=>{S.ok=null;render();},4000);
  }catch(e){S.error='Kunne ikke lagre.';S.saving=false;render();}
}

async function toggleTask(id){
  if(S.locked)return;
  const was=!!S.checkedIds[id];
  if(was)delete S.checkedIds[id];else S.checkedIds[id]=true;
  playTap();render();
  try{await api('check',{taskId:id,checked:!was},null,S.listKey);}catch(e){S.error='Lagring feilet.';render();}
  if(!was&&S.tasks.every(t=>S.checkedIds[t.id])){
    const ts=getTimeStatus();
    S.completionMarginSec=ts.remSec!==null?ts.remSec:null;
    S.locked=true;confetti();render();
    try{await api('logCompletion',{tasksDone:S.tasks.length,tasksTotal:S.tasks.length,deadline:S.deadline,marginSec:S.completionMarginSec},null,S.listKey);}catch(e){}
  }
}

async function resetDay(){
  try{await api('resetDay',{},null,S.listKey);S.checkedIds={};S.locked=false;S.completionMarginSec=null;S.lastMinuteTick=-1;render();}
  catch(e){S.error='Kunne ikke starte på nytt.';render();}
}

function goLists(){S.view='lists';stopIntervals();S.activeRoom=null;S.tasks=[];S.checkedIds={};S.locked=false;S.completionMarginSec=null;render();}
function goSetup(){S.view='setup';stopIntervals();render();}
async function goStatus(){
  S.view='status';stopIntervals();render();
  try{await loadRoom(S.activeRoom.id,null);render();}catch(e){}
  S.pollInterval=setInterval(async()=>{try{await loadRoom(S.activeRoom.id,null);if(S.view==='status')render();}catch(e){}},3000);
}
async function goStatsParent(){S.view='stats';try{S.weekStats=await api('weekStats',null,S.activeRoom.id);}catch(e){S.weekStats=[];}render();}
async function goChildStats(){S.view='stats';try{S.weekStats=await api('weekStats',null,null,S.listKey);}catch(e){S.weekStats=[];}render();}
async function goCompletions(){S.view='completions';stopIntervals();try{S.completions=await api('getCompletions',null,S.activeRoom?.id,S.listKey);}catch(e){S.completions=[];}render();}
function goChildTasks(){S.view='child';render();}
function stopIntervals(){if(S.pollInterval){clearInterval(S.pollInterval);S.pollInterval=null;}if(S.tickInterval){clearInterval(S.tickInterval);S.tickInterval=null;}}

function playTap(){try{const c=new(AudioContext||webkitAudioContext)();[523,784].forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=f;o.type='sine';g.gain.setValueAtTime(0.2,c.currentTime+i*0.08);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+i*0.08+0.15);o.start(c.currentTime+i*0.08);o.stop(c.currentTime+i*0.08+0.2);});}catch(e){}}
function confetti(){const c=['#f9d71c','#ff6b6b','#c77dff','#10b981','#ff8c42','#60a5fa'];for(let i=0;i<70;i++){setTimeout(()=>{const el=document.createElement('div');el.className='cp';el.style.cssText=`left:${Math.random()*100}vw;background:${c[Math.floor(Math.random()*c.length)]};animation-duration:${1.5+Math.random()*2}s;`;document.body.appendChild(el);setTimeout(()=>el.remove(),4000);},i*35);}}

async function init(){
  const params=new URLSearchParams(location.search);
  const listKey=params.get('listKey');
  if(listKey){
    hideSplash(true);
    S.listKey=listKey;S.childKey=listKey;S.view='child';S.loading=true;render();
    try{await loadRoom(null,listKey);S.loading=false;render();}
    catch(e){S.error='Kunne ikke laste oppgaver.';S.loading=false;render();}
    S.pollInterval=setInterval(async()=>{
      if(S.locked)return;
      try{const prev={...S.checkedIds};await loadRoom(null,listKey);Object.keys(prev).forEach(id=>{if(prev[id])S.checkedIds[id]=true;});if(S.view==='child')render();}catch(e){}
    },30000);
    S.tickInterval=setInterval(()=>{if(S.view==='child')render();},1000);
  }else{
    const savedUid=loadSession();
    if(savedUid&&savedUid!==''&&savedUid!=='null'){
      S.userId=parseInt(savedUid);
      try{await fetchLists();S.view='lists';hideSplash(true);render();}
      catch(e){S.view='login';render();}
    }else{S.view='login';render();}
  }
}

init();
</script>
</body>
</html>
