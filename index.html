<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Stepster">
<meta name="theme-color" content="#1a1a2e">
<title>Stepster ⭐</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; background: #1a1a2e; color: #fff; overflow-x: hidden; }

.logo { text-align: center; padding: 1.2rem 1rem 0.4rem; }
.logo h1 { font-size: 2rem; font-weight: 800; background: linear-gradient(135deg,#f9d71c,#ff6b6b,#c77dff); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.logo p { color: #888; font-size: 0.82rem; margin-top: 3px; }

.view { max-width: 520px; margin: 0 auto; padding: 0 1rem 5rem; }
.card { background: #16213e; border-radius: 16px; padding: 1.1rem; margin-bottom: 0.9rem; border: 1px solid #0f3460; }
.card h2 { font-size: 0.95rem; color: #c77dff; margin-bottom: 0.8rem; display:flex; align-items:center; gap:6px; }

input[type=text], input[type=number], input[type=email], input[type=time] {
  background: #0f3460; border: 1px solid #1a4a8a; border-radius: 10px;
  padding: 9px 12px; color: #fff; font-size: 0.9rem; outline: none; width: 100%;
}
input:focus { border-color: #c77dff; }
input::placeholder { color: #555; }
input[type=time]::-webkit-calendar-picker-indicator { filter: invert(1); }
.row { display:flex; gap:8px; align-items:center; }
.row input { flex:1; }

.btn { border:none; border-radius:10px; padding:9px 16px; font-size:0.9rem; font-weight:600; cursor:pointer; transition:transform 0.12s; }
.btn:active { transform:scale(0.96); }
.btn-purple { background:#7c3aed; color:#fff; }
.btn-gray   { background:#0f3460; color:#aaa; }
.btn-gold   { background:linear-gradient(135deg,#f9d71c,#ff8c42); color:#1a1a2e; font-weight:800; }
.btn-gold:disabled { opacity:0.35; cursor:default; transform:none; }
.btn-sm   { padding:6px 12px; font-size:0.8rem; border-radius:8px; }
.btn-full { width:100%; margin-top:0.5rem; border-radius:14px; padding:13px; font-size:1rem; }
.btn-add  { background:#c77dff; border-radius:10px; width:38px; height:38px; display:flex; align-items:center; justify-content:center; font-size:1.3rem; color:#fff; cursor:pointer; border:none; flex-shrink:0; }
.btn-add:hover { background:#a855f7; }
.btn-icon { background:none; border:none; cursor:pointer; font-size:1rem; padding:0 4px; color:#ff6b6b; }

.emoji-row { display:flex; gap:5px; flex-wrap:wrap; margin-bottom:8px; }
.ep { background:#0f3460; border:1.5px solid transparent; border-radius:8px; width:34px; height:34px; display:flex; align-items:center; justify-content:center; font-size:1.15rem; cursor:pointer; }
.ep.sel { border-color:#c77dff; background:#1a0a3a; }

.task-list { list-style:none; display:flex; flex-direction:column; gap:6px; margin-top:0.6rem; }
.task-item { display:flex; align-items:center; background:#0f3460; border-radius:10px; padding:9px 11px; gap:8px; }
.task-name { flex:1; font-size:0.9rem; }
.tag { font-size:0.75rem; background:rgba(249,215,28,0.15); color:#f9d71c; border-radius:6px; padding:2px 7px; white-space:nowrap; }

.link-box { background:#0a1a30; border-radius:12px; padding:11px 13px; margin-top:0.8rem; border:1px solid #1a4a8a; }
.link-box p { font-size:0.78rem; color:#888; margin-bottom:6px; }
.link-url { background:#16213e; border-radius:8px; padding:7px 10px; font-size:0.75rem; color:#c77dff; word-break:break-all; border:1px solid #1a4a8a; margin-bottom:8px; }
.copy-row { display:flex; gap:6px; flex-wrap:wrap; }

.prog-bg { background:#0f3460; border-radius:20px; height:16px; overflow:hidden; }
.prog-fill { height:100%; border-radius:20px; background:linear-gradient(90deg,#10b981,#f9d71c); transition:width 0.5s; }
.prog-txt { text-align:right; font-size:0.78rem; color:#888; margin-top:3px; }

.pstat-task { display:flex; align-items:center; background:#16213e; border-radius:12px; padding:11px 14px; gap:10px; border:1.5px solid transparent; margin-bottom:7px; }
.pstat-task.done { border-color:#10b981; background:#0d2418; }
.pstat-task.done .ptn { text-decoration:line-through; color:#555; }
.ptn { flex:1; font-size:0.95rem; }

/* ── LISTS ── */
.list-item { background:#16213e; border-radius:14px; padding:1rem 1.1rem; display:flex; align-items:center; gap:12px; border:1.5px solid #0f3460; cursor:pointer; margin-bottom:10px; transition:border 0.2s; }
.list-item:hover { border-color:#7c3aed; }
.list-icon { font-size:2rem; }
.list-info { flex:1; }
.list-name { font-size:1rem; font-weight:700; }
.list-meta { font-size:0.78rem; color:#888; margin-top:3px; }
.list-arrow { color:#555; font-size:1.2rem; }

/* ── CHILD HEADER ── */
.child-header { padding:1.5rem 1rem 1.2rem; text-align:center; transition:background 0.5s; }
.child-header.green { background:linear-gradient(135deg,#065f46,#10b981); }
.child-header.red   { background:linear-gradient(135deg,#7f1d1d,#ef4444); }
.child-header.over  { background:linear-gradient(135deg,#3b0764,#7c3aed); }
.child-header h1 { font-size:1.8rem; font-weight:800; margin-bottom:0.3rem; }
.child-header .greeting { color:rgba(255,255,255,0.85); font-size:0.92rem; margin-bottom:0.5rem; }
.stars-row { font-size:1.1rem; margin-top:0.3rem; color:#f9d71c; letter-spacing:3px; }

/* ── COUNTDOWN ── */
.countdown-widget { max-width:520px; margin:0 auto; padding:1rem 1rem 0; }
.cw-main { border-radius:16px; padding:1.3rem 1.4rem; display:flex; align-items:center; gap:1.2rem; }
.cw-main.green { background:#0d2a1e; border:2px solid #10b981; }
.cw-main.red   { background:#2a0a0a; border:2px solid #ef4444; }
.cw-main.over  { background:#1a0a2e; border:2px solid #c77dff; }
.cw-time { font-size:2.6rem; font-weight:800; font-variant-numeric:tabular-nums; min-width:120px; line-height:1; }
.cw-main.green .cw-time { color:#10b981; }
.cw-main.red   .cw-time { color:#ef4444; }
.cw-main.over  .cw-time { color:#c77dff; }
.cw-info { flex:1; display:flex; flex-direction:column; gap:5px; }
.cw-label  { font-size:0.78rem; color:#aaa; }
.cw-status { font-size:0.95rem; font-weight:700; }
.cw-main.green .cw-status { color:#10b981; }
.cw-main.red   .cw-status { color:#ef4444; }
.cw-main.over  .cw-status { color:#c77dff; }
.cw-tasks { font-size:0.82rem; color:#888; }

/* ── NO TASKS ── */
.no-tasks { text-align:center; padding:3rem 1.5rem; }
.no-tasks .nt-icon { font-size:4rem; margin-bottom:1rem; }
.no-tasks h2 { font-size:1.3rem; font-weight:800; color:#888; }
.no-tasks p { color:#555; font-size:0.9rem; margin-top:8px; line-height:1.5; }

/* ── CHILD TASKS ── */
.child-task { background:#16213e; border-radius:20px; padding:16px 18px; display:flex; align-items:center; gap:14px; border:2px solid #0f3460; transition:all 0.3s; cursor:pointer; margin-bottom:12px; }
.child-task:active { transform:scale(0.97); }
.child-task.done { background:#0b2018; border-color:#10b981; }
.child-task.done .ct-name { text-decoration:line-through; color:#555; }
.child-task.next-up { border-color:#f9d71c; }
.ct-emoji { font-size:2rem; }
.ct-info { flex:1; min-width:0; }
.ct-name { font-size:1.05rem; font-weight:700; }
.ct-sub { font-size:0.8rem; color:#888; margin-top:3px; }
.ct-check { width:38px; height:38px; border-radius:50%; border:2.5px solid #333; display:flex; align-items:center; justify-content:center; font-size:1.3rem; transition:all 0.3s; flex-shrink:0; }
.child-task.done .ct-check { background:#10b981; border-color:#10b981; }

/* ── LOGIN ── */
.login-wrap { max-width:400px; margin:0 auto; padding:2rem 1.5rem 5rem; }
.login-logo { text-align:center; padding:2rem 0 1.5rem; }
.login-logo h1 { font-size:2.8rem; font-weight:800; background:linear-gradient(135deg,#f9d71c,#ff6b6b,#c77dff); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.login-logo p { color:#888; font-size:0.9rem; margin-top:6px; }
.pin-dots { display:flex; gap:10px; justify-content:center; margin:1rem 0; }
.pin-dot { width:16px; height:16px; border-radius:50%; border:2px solid #555; transition:all 0.2s; }
.pin-dot.filled { background:#c77dff; border-color:#c77dff; }
.pin-pad { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:1rem; }
.pin-btn { background:#16213e; border:1px solid #0f3460; border-radius:14px; padding:16px; font-size:1.3rem; font-weight:700; color:#fff; cursor:pointer; text-align:center; transition:background 0.15s; }
.pin-btn:active { background:#0f3460; transform:scale(0.95); }
.pin-btn.del { font-size:1rem; color:#888; }
.pin-btn.empty { background:transparent; border:none; cursor:default; }

/* ── STATS ── */
.all-done { text-align:center; padding:1.5rem 1rem; }
.all-done h2 { font-size:1.8rem; font-weight:800; color:#f9d71c; }
.all-done p { color:#aaa; margin-top:8px; }

.week-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:6px; margin-top:0.6rem; }
.day-cell { background:#0f3460; border-radius:8px; padding:8px 4px; text-align:center; }
.day-label { font-size:0.68rem; color:#888; margin-bottom:4px; }
.day-stars-on   { font-size:0.82rem; color:#f9d71c; font-weight:700; min-height:1.1em; }
.day-stars-late { font-size:0.82rem; color:#f59e0b; opacity:0.6; min-height:1.1em; }
.day-cell.today { border:1.5px solid #c77dff; }
.stat-row { display:flex; gap:8px; margin-bottom:0.6rem; }
.stat-box { flex:1; background:#0f3460; border-radius:10px; padding:10px; text-align:center; }
.stat-num { font-size:1.4rem; font-weight:800; color:#f9d71c; }
.stat-lbl { font-size:0.72rem; color:#888; margin-top:2px; }
.legend { display:flex; gap:14px; margin-top:8px; font-size:0.78rem; color:#888; justify-content:center; }

.bnav { position:fixed; bottom:0; left:0; right:0; background:#16213e; border-top:1px solid #0f3460; display:flex; z-index:100; }
.bnav-btn { flex:1; padding:10px 6px; background:none; border:none; color:#666; font-size:0.72rem; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:2px; }
.bnav-btn.active { color:#c77dff; }
.bnav-icon { font-size:1.2rem; }

.cp { position:fixed; width:9px; height:9px; top:-10px; animation:cf linear forwards; z-index:9999; border-radius:2px; pointer-events:none; }
@keyframes cf { to{transform:translateY(110vh) rotate(720deg);opacity:0} }

.loading { text-align:center; padding:3rem 1rem; color:#888; }
.spin { display:inline-block; font-size:2rem; animation:spin 1s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }

.error-box   { background:#2a0a0a; border:1px solid #ff6b6b; border-radius:12px; padding:1rem; margin:0.5rem 0; color:#ff9999; font-size:0.88rem; }
.success-box { background:#0a2a1a; border:1px solid #10b981; border-radius:12px; padding:0.8rem 1rem; margin:0.5rem 0; color:#6ee7b7; font-size:0.85rem; }

.section-lbl { font-size:0.75rem; color:#888; margin-bottom:5px; display:block; }
.quick-btns  { display:flex; gap:5px; flex-wrap:wrap; margin-top:8px; }
.quick-btn   { background:#0f3460; border:1px solid #1a4a8a; border-radius:8px; padding:4px 9px; color:#aaa; font-size:0.72rem; cursor:pointer; }
.muted { color:#888; font-size:0.8rem; }
.tab-row { display:flex; gap:8px; margin-bottom:1rem; }
.tab { flex:1; padding:9px; border-radius:10px; border:1.5px solid #0f3460; background:#16213e; color:#888; font-size:0.88rem; font-weight:600; cursor:pointer; text-align:center; }
.tab.active { border-color:#7c3aed; color:#c77dff; background:#1a0a3a; }
</style>
</head>
<body>
<div id="app"></div>
<script>
// ════════════════════════════════════════════════════
const API_URL = 'https://startask-api-gcb3cke7bagha3fu.norwayeast-01.azurewebsites.net/api/api';
// ════════════════════════════════════════════════════

const EMOJIS = ['🦷','👕','🎒','🥣','👟','🛁','🚿','📚','🥤','😴','🧴','🧦','🍎','🎨','🧹'];
const QUICK  = [{e:'🦷',n:'Pusse tenner',m:3},{e:'👕',n:'Kle på deg',m:5},{e:'🥣',n:'Spise frokost',m:10},{e:'🎒',n:'Pakke sekken',m:5},{e:'👟',n:'Ta på sko',m:2}];
const DAYS   = ['Man','Tir','Ons','Tor','Fre','Lør','Søn'];
const GRACE_MINUTES = 30;

const S = {
  view: 'login',
  loginTab: 'login',
  pinInput: '',
  emailInput: '',
  userId: null,

  lists: [],
  activeRoom: null,

  tasks: [], checkedIds: {},
  taskInput: '', taskMins: 5, taskEmoji: '⭐',
  deadlineInput: '07:30',
  showNewList: false,
  childName: '',

  deadline: null,
  childRoomKey: null, childKey: null,
  weekStats: [],

  pollInterval: null, tickInterval: null,
  lastMinuteTick: -1,
  saving: false, loading: false, error: null, ok: null,
};

// ── LOCALSTORAGE ──────────────────────────────────────────────
function lsGet(k){try{return localStorage.getItem(k);}catch(e){return null;}}
function lsSet(k,v){try{localStorage.setItem(k,v);}catch(e){}}
function saveSession(){lsSet('sp_uid', String(S.userId));}
function loadSession(){return lsGet('sp_uid');}

// ── DEADLINE PARSING ──────────────────────────────────────────
function parseDeadline(dl) {
  if (!dl) return null;
  try {
    const d = new Date(dl);
    if (!isNaN(d.getTime())) {
      return d.getUTCHours().toString().padStart(2,'0') + ':' + d.getUTCMinutes().toString().padStart(2,'0');
    }
    return String(dl).substring(0, 5);
  } catch(e) { return null; }
}

function getDeadlineMs(dl) {
  if (!dl) return null;
  const [h,m] = dl.split(':').map(Number);
  const d = new Date();
  d.setHours(h, m, 0, 0);
  return d.getTime();
}

// ── TRAFIKKLYS 1:1 ───────────────────────────────────────────
function getTimeStatus() {
  if (!S.deadline) return { state:'green', remSec:null };
  const now     = Date.now();
  const dlMs    = getDeadlineMs(S.deadline);
  const graceMs = dlMs + GRACE_MINUTES * 60000;
  if (now > graceMs) return { state:'expired', remSec:0 };
  const remSec = Math.floor((dlMs - now) / 1000);
  if (now > dlMs) return { state:'over', remSec: -Math.floor((now-dlMs)/1000) };
  const remainingSec = S.tasks.filter(t=>!S.checkedIds[t.id]).reduce((s,t)=>s+t.mins,0) * 60;
  return { state: remSec > remainingSec ? 'green' : 'red', remSec, remainingSec };
}

function fmtTime(sec) {
  const abs = Math.abs(Math.round(sec));
  const h = Math.floor(abs/3600);
  const m = Math.floor((abs%3600)/60);
  const s = abs%60;
  return h > 0
    ? `${h}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`
    : `${m}:${s.toString().padStart(2,'0')}`;
}

// ── LYD HVERT MINUTT ─────────────────────────────────────────
function playMinuteTick(isRed) {
  try {
    const ctx = new(AudioContext||webkitAudioContext)();
    if (isRed) {
      [880,660,440].forEach((f,i)=>{
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.connect(g);g.connect(ctx.destination);
        o.frequency.value=f;o.type='sine';
        g.gain.setValueAtTime(0.3,ctx.currentTime+i*0.1);
        g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*0.1+0.15);
        o.start(ctx.currentTime+i*0.1);o.stop(ctx.currentTime+i*0.1+0.2);
      });
    } else {
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=523;o.type='sine';
      g.gain.setValueAtTime(0.1,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.3);
      o.start(ctx.currentTime);o.stop(ctx.currentTime+0.35);
    }
  } catch(e){}
}

function checkMinuteTick(ts) {
  if (!S.deadline || ts.state==='expired' || ts.remSec===null) return;
  const currentMinute = Math.floor(Math.abs(ts.remSec) / 60);
  if (currentMinute !== S.lastMinuteTick && S.lastMinuteTick !== -1) {
    playMinuteTick(ts.state === 'red');
  }
  S.lastMinuteTick = currentMinute;
}

// ── API ───────────────────────────────────────────────────────
async function api(action, body, roomId, childKey) {
  let url = `${API_URL}?action=${action}`;
  if (roomId)   url += `&room=${encodeURIComponent(roomId)}`;
  if (childKey) url += `&childKey=${encodeURIComponent(childKey)}`;
  const res = await fetch(url, {
    method: body ? 'POST' : 'GET',
    headers: {'Content-Type':'application/json'},
    ...(body ? {body: JSON.stringify(body)} : {})
  });
  if (!res.ok) {
    const err = await res.json().catch(()=>({}));
    throw new Error(err.error || `HTTP ${res.status}`);
  }
  return res.json();
}

async function loadRoom(roomId, childKey) {
  const rows = await api('getRoom', null, roomId, childKey);
  if (!rows?.length) return false;
  S.childName = rows[0].child_name || 'Barnet';
  S.deadline  = parseDeadline(rows[0].deadline);
  const m = {};
  rows.forEach(r => {
    if (!r.task_id) return;
    if (!m[r.task_id]) m[r.task_id] = {id:r.task_id, name:r.task_name, emoji:r.emoji, mins:r.mins, order:r.sort_order};
    if (r.checked_at) S.checkedIds[r.task_id] = true;
  });
  S.tasks = Object.values(m).sort((a,b)=>a.order-b.order);
  return true;
}

// ── RENDER ────────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  if      (S.view==='login')  app.innerHTML = tplLogin();
  else if (S.view==='lists')  app.innerHTML = tplLists();
  else if (S.view==='setup')  app.innerHTML = tplSetup();
  else if (S.view==='status') app.innerHTML = tplStatus();
  else if (S.view==='child')  app.innerHTML = tplChild();
  else if (S.view==='stats')  app.innerHTML = tplStats();
}

// ── LOGIN / REGISTER ──────────────────────────────────────────
function tplLogin() {
  const dots = [0,1,2,3].map(i=>`<div class="pin-dot ${i<S.pinInput.length?'filled':''}"></div>`).join('');
  return `
    <div class="login-wrap">
      <div class="login-logo">
        <h1>Stepster</h1>
        <p>Gjør morgenstell til en lek! ⭐</p>
      </div>
      <div class="tab-row">
        <button class="tab ${S.loginTab==='login'?'active':''}" onclick="S.loginTab='login';S.pinInput='';S.error=null;render()">Logg inn</button>
        <button class="tab ${S.loginTab==='register'?'active':''}" onclick="S.loginTab='register';S.pinInput='';S.error=null;render()">Registrer deg</button>
      </div>
      ${S.error?`<div class="error-box">⚠️ ${S.error}</div>`:''}
      ${S.ok?`<div class="success-box">✅ ${S.ok}</div>`:''}
      <div class="card">
        <h2>📧 ${S.loginTab==='login'?'Din epostadresse':'Velg epostadresse'}</h2>
        <input type="email" id="email-input" placeholder="navn@epost.no" value="${S.emailInput}" oninput="S.emailInput=this.value">
      </div>
      <div class="card">
        <h2>🔐 ${S.loginTab==='login'?'PIN-kode':'Velg PIN-kode (4 siffer)'}</h2>
        <div class="pin-dots">${dots}</div>
        <div class="pin-pad">
          ${[1,2,3,4,5,6,7,8,9].map(n=>`<button class="pin-btn" onclick="pinPress(${n})">${n}</button>`).join('')}
          <button class="pin-btn empty"></button>
          <button class="pin-btn" onclick="pinPress(0)">0</button>
          <button class="pin-btn del" onclick="pinDel()">⌫</button>
        </div>
      </div>
    </div>`;
}

function pinPress(n) {
  if (S.pinInput.length >= 4) return;
  // Hent epost fra DOM hvis ikke allerede satt
  const emailEl = document.getElementById('email-input');
  if (emailEl) S.emailInput = emailEl.value;
  S.pinInput += n; render();
  if (S.pinInput.length === 4) {
    if (S.loginTab === 'login') doLogin();
    else doRegister();
  }
}
function pinDel() { S.pinInput = S.pinInput.slice(0,-1); render(); }

async function doLogin() {
  if (!S.emailInput) { S.error='Skriv inn epostadresse'; S.pinInput=''; render(); return; }
  S.error=null;
  try {
    const r = await api('login', {email:S.emailInput, pin:S.pinInput});
    S.userId = r.userId;
    saveSession();
    await fetchLists();
    S.view = 'lists'; render();
  } catch(e) { S.error = e.message; S.pinInput=''; render(); }
}

async function doRegister() {
  if (!S.emailInput) { S.error='Skriv inn epostadresse'; S.pinInput=''; render(); return; }
  S.error=null;
  try {
    const r = await api('register', {email:S.emailInput, pin:S.pinInput});
    S.userId = r.userId;
    saveSession();
    S.lists = [];
    S.view = 'lists'; render();
  } catch(e) { S.error = e.message; S.pinInput=''; render(); }
}

// ── OPPGAVELISTER ─────────────────────────────────────────────
async function fetchLists() {
  const r = await api('getLists', {userId: S.userId});
  S.lists = r || [];
}

function tplLists() {
  const listItems = S.lists.map(l => `
    <div class="list-item" onclick="openList('${l.id}')">
      <div class="list-icon">📋</div>
      <div class="list-info">
        <div class="list-name">${l.name}</div>
        <div class="list-meta">${l.child_name} · ${l.task_count||0} oppgaver${l.deadline?' · Frist '+parseDeadline(l.deadline):''}</div>
      </div>
      <div class="list-arrow">›</div>
    </div>`).join('');

  const newListForm = S.showNewList ? `
    <div class="card">
      <h2>✨ Ny oppgaveliste</h2>
      <div style="display:flex;flex-direction:column;gap:12px;">
        <div>
          <span class="section-lbl">Navn på listen (f.eks. "Morgenrutine")</span>
          <input type="text" id="new-list-name" placeholder="Morgenrutine">
        </div>
        <div>
          <span class="section-lbl">Barnets navn</span>
          <input type="text" id="new-child-name" placeholder="F.eks. Emma">
        </div>
        <div>
          <span class="section-lbl">Frist (klokkeslett)</span>
          <input type="time" id="new-deadline" value="07:30">
        </div>
        <div class="row" style="margin-top:4px;">
          <button class="btn btn-gold" onclick="createList()">Opprett liste</button>
          <button class="btn btn-gray" onclick="S.showNewList=false;render()">Avbryt</button>
        </div>
      </div>
    </div>` : `
    <button class="btn btn-purple btn-full" onclick="S.showNewList=true;render()">+ Ny oppgaveliste</button>`;

  return `
    <div class="logo"><h1>Stepster ⭐</h1><p>Velg oppgaveliste</p></div>
    <div class="view">
      ${S.error?`<div class="error-box">⚠️ ${S.error}</div>`:''}
      ${S.ok?`<div class="success-box">✅ ${S.ok}</div>`:''}
      ${S.lists.length ? listItems : `<div class="card" style="text-align:center;color:#888;padding:2rem">Du har ingen oppgavelister ennå.<br>Opprett din første nedenfor!</div>`}
      ${newListForm}
      <div style="text-align:center;margin-top:1.5rem;">
        <button onclick="doLogout()" style="background:none;border:none;color:#555;cursor:pointer;font-size:0.82rem;text-decoration:underline">Logg ut</button>
      </div>
    </div>`;
}

async function createList() {
  // Les direkte fra DOM — ikke fra S-state som kan være utdatert
  const name      = document.getElementById('new-list-name')?.value?.trim();
  const childName = document.getElementById('new-child-name')?.value?.trim();
  const deadline  = document.getElementById('new-deadline')?.value || '07:30';

  if (!name)      { S.error='Skriv inn navn på listen'; render(); return; }
  if (!childName) { S.error='Skriv inn barnets navn'; render(); return; }

  S.error=null; S.saving=true;
  try {
    await api('createList', {
      userId:    S.userId,
      name,
      childName,
      deadline
    });
    S.showNewList = false;
    await fetchLists();
    S.saving = false;
    S.ok = 'Oppgaveliste opprettet!';
    render();
    setTimeout(()=>{S.ok=null;render();},3000);
  } catch(e) { S.error=e.message; S.saving=false; render(); }
}

async function openList(roomId) {
  S.error=null; S.loading=true; S.checkedIds={};
  S.activeRoom = S.lists.find(l=>l.id===roomId);
  S.childRoomKey = S.activeRoom?.child_key;
  S.view='setup'; render();
  try {
    await loadRoom(roomId, null);
    S.deadlineInput = S.deadline || '07:30';
    S.loading=false; render();
  } catch(e) { S.error='Kunne ikke laste liste.'; S.loading=false; render(); }
}

// ── PARENT SETUP ──────────────────────────────────────────────
function tplSetup() {
  if (S.loading) return `<div class="loading"><div class="spin">⭐</div><p style="margin-top:1rem">Laster...</p></div>`;
  const rows = S.tasks.map((t,i)=>`
    <li class="task-item">
      <span>${t.emoji}</span><span class="task-name">${t.name}</span>
      <span class="tag">${t.mins} min</span>
      <button class="btn-icon" onclick="removeTask(${i})">✕</button>
    </li>`).join('');
  const totalMins = S.tasks.reduce((s,t)=>s+t.mins,0);
  const linkBox = S.childRoomKey ? `
    <div class="link-box">
      <p>📱 Send denne lenken til ${S.childName||'barnet'} — lenken er alltid den samme:</p>
      <div class="link-url">${childLink()}</div>
      <div class="copy-row">
        <button class="btn btn-purple btn-sm" onclick="copyChildLink()">📋 Kopier lenke</button>
        <button class="btn btn-gray btn-sm" onclick="goStatus()">👀 Se status</button>
      </div>
    </div>` : '';

  return `
    <div class="logo"><h1>Stepster ⭐</h1><p>${S.activeRoom?.name||'Oppgaveliste'}</p></div>
    <div class="view">
      ${S.error?`<div class="error-box">⚠️ ${S.error}</div>`:''}
      ${S.ok?`<div class="success-box">✅ ${S.ok}</div>`:''}
      <div class="card">
        <h2>⏰ Frist — alt skal være ferdig innen:</h2>
        <input type="time" id="deadline-input" value="${S.deadlineInput}" oninput="S.deadlineInput=this.value" style="font-size:1.3rem;font-weight:800;text-align:center;padding:12px;">
        <div style="font-size:0.75rem;color:#888;margin-top:6px">Barnet ser nedtelling og trafikklys basert på denne fristen</div>
      </div>
      <div class="card">
        <h2>✏️ Legg til oppgave</h2>
        <span class="section-lbl">Velg ikon:</span>
        <div class="emoji-row">${EMOJIS.map(e=>`<div class="ep ${S.taskEmoji===e?'sel':''}" onclick="selEmoji('${e}')">${e}</div>`).join('')}</div>
        <div class="row">
          <input type="text" id="ti" placeholder="Hva skal gjøres?" value="${S.taskInput}" oninput="S.taskInput=this.value" onkeydown="if(event.key==='Enter')addTask()">
          <input type="number" id="tm" value="${S.taskMins}" min="1" max="60" oninput="S.taskMins=parseInt(this.value)||1" style="width:62px;flex:none">
          <span class="muted" style="flex-shrink:0">min</span>
          <button class="btn-add" onclick="addTask()">+</button>
        </div>
        <div class="quick-btns">${QUICK.map(q=>`<button class="quick-btn" onclick="quickAdd('${q.e}','${q.n}',${q.m})">${q.e} ${q.n}</button>`).join('')}</div>
      </div>
      ${S.tasks.length?`
      <div class="card">
        <h2>📋 Oppgaver (${S.tasks.length}) — ${totalMins} min totalt</h2>
        <ul class="task-list">${rows}</ul>
      </div>`:''}
      <button class="btn btn-gold btn-full" ${(S.saving)?'disabled':''} onclick="saveAndLink()">
        ${S.saving?'⏳ Lagrer...':'🚀 Lagre oppgaveliste'}
      </button>
      ${linkBox}
      <div style="text-align:center;margin-top:1rem;">
        <button onclick="goLists()" style="background:none;border:none;color:#888;cursor:pointer;font-size:0.82rem;text-decoration:underline">← Tilbake til mine lister</button>
      </div>
    </div>`;
}

// ── PARENT STATUS ─────────────────────────────────────────────
function tplStatus() {
  const done = S.tasks.filter(t=>S.checkedIds[t.id]).length;
  const pct  = S.tasks.length ? Math.round(done/S.tasks.length*100) : 0;
  const rows = S.tasks.map(t=>{const d=!!S.checkedIds[t.id];return`<div class="pstat-task ${d?'done':''}"><span style="font-size:1.3rem">${t.emoji}</span><span class="ptn">${t.name}</span><span class="tag">${t.mins} min</span><span>${d?'✅':'⬜'}</span></div>`;}).join('');
  return `
    <div class="logo"><h1>Stepster ⭐</h1><p>${S.activeRoom?.name||'Status'}</p></div>
    <div class="view">
      <div class="card">
        <h2>📊 Fremgang</h2>
        <div class="prog-bg"><div class="prog-fill" style="width:${pct}%"></div></div>
        <div class="prog-txt">${done} av ${S.tasks.length} gjort — ${pct}%</div>
        ${S.deadline?`<div style="margin-top:6px;font-size:0.8rem;color:#888">Frist: <strong style="color:#f9d71c">${S.deadline}</strong></div>`:''}
        <div style="margin-top:4px;font-size:0.78rem;color:#555">Oppdateres automatisk hvert 3. sek</div>
      </div>
      <div class="card" style="padding-bottom:0.5rem">${rows||'<p class="muted">Ingen oppgaver ennå.</p>'}</div>
    </div>
    <div class="bnav">
      <button class="bnav-btn" onclick="goSetup()"><span class="bnav-icon">✏️</span>Rediger</button>
      <button class="bnav-btn active"><span class="bnav-icon">👀</span>Status</button>
      <button class="bnav-btn" onclick="goStatsParent()"><span class="bnav-icon">📈</span>Statistikk</button>
    </div>`;
}

// ── CHILD VIEW ────────────────────────────────────────────────
function tplChild() {
  if (S.loading) return `<div class="loading"><div class="spin">⭐</div><p style="margin-top:1rem">Laster oppgaver...</p></div>`;
  const ts = getTimeStatus();
  checkMinuteTick(ts);

  if (ts.state === 'expired') return `
    <div class="child-header over">
      <h1>Stepster ⭐</h1>
      <div class="greeting">Hei ${S.childName||''}!</div>
    </div>
    <div class="view" style="padding-top:1rem">
      <div class="no-tasks">
        <div class="nt-icon">😴</div>
        <h2>Ingen oppgaver akkurat nå</h2>
        <p>Fristen for i dag er passert.<br>Foreldre legger ut nye oppgaver til i morgen!</p>
      </div>
    </div>`;

  const done      = S.tasks.filter(t=>S.checkedIds[t.id]).length;
  const allDone   = done === S.tasks.length && S.tasks.length > 0;
  const remaining = S.tasks.filter(t=>!S.checkedIds[t.id]);
  const next      = remaining[0];
  const cwState   = ts.state === 'over' ? 'over' : ts.state;

  let cwHtml = '';
  if (S.deadline) {
    const isOver = ts.state === 'over';
    const absSec = Math.abs(ts.remSec||0);
    let statusText = '';
    if (isOver)              statusText = `⚠️ Fristen er passert!`;
    else if (ts.state==='red')    statusText = `🔴 Du rekker det IKKE — skynd deg!`;
    else                          statusText = `🟢 Du rekker det fint — bra jobbet!`;
    const remTaskText = remaining.length > 0
      ? `${remaining.length} oppgave${remaining.length>1?'r':''} igjen (${remaining.reduce((s,t)=>s+t.mins,0)} min)`
      : '🎉 Alle oppgaver er gjort!';
    cwHtml = `
      <div class="countdown-widget">
        <div class="cw-main ${cwState}">
          <div class="cw-time">${isOver?'-':''}${fmtTime(absSec)}</div>
          <div class="cw-info">
            <div class="cw-label">Frist: ${S.deadline}</div>
            <div class="cw-status">${statusText}</div>
            <div class="cw-tasks">${remTaskText}</div>
          </div>
        </div>
      </div>`;
  }

  const cards = S.tasks.map(t=>{
    const isDone = !!S.checkedIds[t.id], isNext = !isDone && t===next;
    return `<div class="child-task ${isDone?'done':''} ${isNext?'next-up':''}" onclick="toggleTask('${t.id}')">
      <span class="ct-emoji">${t.emoji}</span>
      <div class="ct-info">
        <div class="ct-name">${t.name}</div>
        <div class="ct-sub">${t.mins} min${isNext?' — neste!':''}</div>
      </div>
      <div class="ct-check">${isDone?'✅':''}</div>
    </div>`;
  }).join('');

  return `
    <div class="child-header ${cwState}">
      <h1>Stepster ⭐</h1>
      <div class="greeting">Hei ${S.childName||''}! Du klarer dette! 💪</div>
      <div class="stars-row">${'⭐'.repeat(done)}${'☆'.repeat(Math.max(0,S.tasks.length-done))}</div>
    </div>
    ${cwHtml}
    <div class="view" style="padding-top:0.8rem">
      ${allDone?`<div class="all-done"><h2>🎉 Fantastisk!</h2><p>Du er en ekte stjerne! Alle oppgaver er gjort!</p></div>`:''}
      ${cards}
      ${S.error?`<div class="error-box">⚠️ ${S.error}</div>`:''}
    </div>
    <div class="bnav">
      <button class="bnav-btn active"><span class="bnav-icon">📋</span>Oppgaver</button>
      <button class="bnav-btn" onclick="goChildStats()"><span class="bnav-icon">⭐</span>Mine stjerner</button>
    </div>`;
}

// ── STATS ─────────────────────────────────────────────────────
function tplStats() {
  const today = dateKey(new Date()), week = getWeekDays();
  const isChild = !!S.childKey;
  const totalOnTime = S.weekStats.reduce((s,d)=>s+(d.stars_on_time||0),0);
  const totalLate   = S.weekStats.reduce((s,d)=>s+(d.stars_late||0),0);
  const total       = totalOnTime + totalLate;
  const bestDay     = Math.max(0,...S.weekStats.map(d=>d.stars||0));
  const byDay = {};
  S.weekStats.forEach(d=>{byDay[d.checked_at]={onTime:d.stars_on_time||0,late:d.stars_late||0};});

  const dayCells = week.map(d=>{
    const data = byDay[d.key]||{onTime:0,late:0};
    return `<div class="day-cell ${d.key===today?'today':''}">
      <div class="day-label">${d.label}</div>
      <div class="day-stars-on">${data.onTime>0?'⭐'.repeat(Math.min(data.onTime,5)):'—'}</div>
      <div class="day-stars-late">${data.late>0?'⏰'.repeat(Math.min(data.late,5)):''}</div>
    </div>`;
  }).join('');

  return `
    <div class="logo"><h1>Stepster ⭐</h1><p>${isChild?(S.childName||'')+'s statistikk':'Statistikk'}</p></div>
    <div class="view">
      <div class="card">
        <h2>📅 Denne uken</h2>
        <div class="week-grid">${dayCells}</div>
        <div class="legend"><span>⭐ I tide</span><span>⏰ Etter frist</span></div>
      </div>
      <div class="stat-row">
        <div class="stat-box"><div class="stat-num">${totalOnTime}</div><div class="stat-lbl">I tide ⭐</div></div>
        <div class="stat-box"><div class="stat-num">${totalLate}</div><div class="stat-lbl">Etter frist ⏰</div></div>
        <div class="stat-box"><div class="stat-num">${bestDay}</div><div class="stat-lbl">Beste dag</div></div>
      </div>
      <div class="card"><h2>🏆 Motivasjon</h2><p style="font-size:0.9rem;color:#ccc;line-height:1.6">${motMsg(totalOnTime,total)}</p></div>
    </div>
    <div class="bnav">
      <button class="bnav-btn" onclick="${isChild?'goChildTasks()':'goSetup()'}"><span class="bnav-icon">${isChild?'📋':'✏️'}</span>${isChild?'Oppgaver':'Rediger'}</button>
      ${!isChild?`<button class="bnav-btn" onclick="goStatus()"><span class="bnav-icon">👀</span>Status</button>`:''}
      <button class="bnav-btn active"><span class="bnav-icon">📈</span>Statistikk</button>
    </div>`;
}

// ── HELPERS ───────────────────────────────────────────────────
function dateKey(d){return d.toISOString().split('T')[0];}
function getWeekDays(){const t=new Date(),d=[];for(let i=6;i>=0;i--){const x=new Date(t);x.setDate(t.getDate()-i);d.push({key:dateKey(x),label:DAYS[x.getDay()===0?6:x.getDay()-1]});}return d;}
function motMsg(onTime,total){
  if(total===0)return'Start i dag og tjen din første stjerne! 💪';
  if(onTime>=total&&total>=5)return`Utrolig! ${onTime} stjerner i tide! Du er en ekte SuperHelt! 🦸`;
  if(onTime>0&&onTime>=total*0.8)return`Kjempebra! ${onTime} av ${total} stjerner kom i tide! 🌟`;
  if(total>=3)return`${total} oppgaver gjort! Prøv å få flere innenfor fristen! 💪`;
  return'Fortsett slik — du blir bedre for hver dag! ⭐';
}
function childLink(){const u=new URL(location.href.split('?')[0]);u.searchParams.set('childKey',S.childRoomKey);u.searchParams.set('child','1');return u.toString();}
function copyChildLink(){navigator.clipboard.writeText(childLink()).then(()=>{S.ok='Lenken er kopiert!';render();setTimeout(()=>{S.ok=null;render();},4000);});}
function selEmoji(e){S.taskEmoji=e;render();}
function addTask(){
  const el=document.getElementById('ti');
  const n=(el?el.value:S.taskInput).trim();
  if(!n)return;
  S.tasks.push({id:Date.now().toString(),name:n,mins:S.taskMins,emoji:S.taskEmoji});
  S.taskInput='';render();
}
function quickAdd(e,n,m){S.tasks.push({id:Date.now().toString(),name:n,mins:m,emoji:e});render();}
function removeTask(i){S.tasks.splice(i,1);render();}
function doLogout(){lsSet('sp_uid','');S.userId=null;S.view='login';S.emailInput='';S.pinInput='';S.error=null;stopIntervals();render();}

async function saveAndLink(){
  S.error=null;S.saving=true;
  // Les deadline fra DOM
  const dlEl = document.getElementById('deadline-input');
  if (dlEl) S.deadlineInput = dlEl.value;
  render();
  try{
    await api('saveRoom',{roomId:S.activeRoom.id,tasks:S.tasks,deadline:S.deadlineInput,childName:S.childName,name:S.activeRoom.name});
    S.deadline=S.deadlineInput;
    S.ok='Lagret!';S.saving=false;render();
    setTimeout(()=>{S.ok=null;render();},4000);
  }catch(e){S.error='Kunne ikke lagre. Sjekk internett.';S.saving=false;render();}
}

async function toggleTask(id){
  const was=!!S.checkedIds[id];
  if(was){delete S.checkedIds[id];}
  else{S.checkedIds[id]=true;}
  playTap();render();
  try{await api('check',{taskId:id,checked:!was},null,S.childRoomKey);}catch(e){S.error='Lagring feilet.';render();}
  if(!was&&S.tasks.every(t=>S.checkedIds[t.id]))confetti();
}

function goLists(){S.view='lists';stopIntervals();S.activeRoom=null;S.tasks=[];S.checkedIds={};render();}
function goSetup(){S.view='setup';stopIntervals();render();}
async function goStatus(){
  S.view='status';stopIntervals();render();
  try{await loadRoom(S.activeRoom.id,null);render();}catch(e){}
  S.pollInterval=setInterval(async()=>{try{await loadRoom(S.activeRoom.id,null);if(S.view==='status')render();}catch(e){}},3000);
}
async function goStatsParent(){S.view='stats';try{S.weekStats=await api('weekStats',null,S.activeRoom.id);}catch(e){S.weekStats=[];}render();}
async function goChildStats(){S.view='stats';try{S.weekStats=await api('weekStats',null,null,S.childRoomKey);}catch(e){S.weekStats=[];}render();}
function goChildTasks(){S.view='child';render();}
function stopIntervals(){if(S.pollInterval){clearInterval(S.pollInterval);S.pollInterval=null;}if(S.tickInterval){clearInterval(S.tickInterval);S.tickInterval=null;}}

function playTap(){try{const c=new(AudioContext||webkitAudioContext)();[523,784].forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=f;o.type='sine';g.gain.setValueAtTime(0.2,c.currentTime+i*0.08);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+i*0.08+0.15);o.start(c.currentTime+i*0.08);o.stop(c.currentTime+i*0.08+0.2);});}catch(e){}}
function confetti(){const c=['#f9d71c','#ff6b6b','#c77dff','#10b981','#ff8c42','#60a5fa'];for(let i=0;i<70;i++){setTimeout(()=>{const el=document.createElement('div');el.className='cp';el.style.cssText=`left:${Math.random()*100}vw;background:${c[Math.floor(Math.random()*c.length)]};animation-duration:${1.5+Math.random()*2}s;`;document.body.appendChild(el);setTimeout(()=>el.remove(),4000);},i*35);}}

// ── INIT ──────────────────────────────────────────────────────
async function init(){
  const params   = new URLSearchParams(location.search);
  const childKey = params.get('childKey');
  const isChild  = params.get('child') === '1';

  if (childKey && isChild) {
    S.childRoomKey = childKey;
    S.childKey     = childKey;
    S.view         = 'child';
    S.loading      = true; render();
    try {
      await loadRoom(null, childKey);
      S.loading = false; render();
    } catch(e) {
      S.error = 'Kunne ikke laste oppgaver. Sjekk internett.';
      S.loading = false; render();
    }
    S.pollInterval = setInterval(async()=>{
      try{
        const prevChecked = {...S.checkedIds};
        await loadRoom(null, childKey);
        Object.keys(prevChecked).forEach(id=>{if(prevChecked[id])S.checkedIds[id]=true;});
        if(S.view==='child')render();
      }catch(e){}
    }, 30000);
    S.tickInterval = setInterval(()=>{if(S.view==='child')render();}, 1000);

  } else {
    const savedUid = loadSession();
    if (savedUid && savedUid !== '' && savedUid !== 'null') {
      S.userId = parseInt(savedUid);
      try {
        await fetchLists();
        S.view = 'lists';
      } catch(e) {
        S.view = 'login';
      }
    } else {
      S.view = 'login';
    }
    render();
  }
}

init();
</script>
