<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{CHILD_NAME}} er ferdig! 🎉</title>
</head>
<body style="margin:0;padding:0;background:#1a1a2e;font-family:'Segoe UI',system-ui,sans-serif;">

<table width="100%" cellpadding="0" cellspacing="0" style="background:#1a1a2e;padding:40px 20px;">
  <tr>
    <td align="center">
      <table width="100%" cellpadding="0" cellspacing="0" style="max-width:520px;">

        <!-- HEADER -->
        <tr>
          <td align="center" style="background:{{HEADER_BG}};border-radius:20px 20px 0 0;padding:40px 30px 30px;">
            <img src="https://stepster.no/mascot.png" width="100" alt="Stepster" style="display:block;margin:0 auto 16px;">
            <div style="font-size:1.8rem;font-weight:900;color:#fff;margin-bottom:6px;">{{CHILD_NAME}} er ferdig! {{STATUS_EMOJI}}</div>
            <div style="color:rgba(255,255,255,0.8);font-size:0.95rem;">{{STATUS_TEXT}}</div>
          </td>
        </tr>

        <!-- BODY -->
        <tr>
          <td style="background:#16213e;padding:32px 36px;border:1px solid #0f3460;border-top:none;">

            <!-- RESULT BOX -->
            <table width="100%" cellpadding="0" cellspacing="0" style="margin-bottom:28px;">
              <tr>
                <td align="center" style="background:#0f3460;border-radius:16px;padding:24px;border:1.5px solid {{BORDER_COLOR}};">
                  <div style="color:#888;font-size:0.8rem;margin-bottom:8px;letter-spacing:1px;text-transform:uppercase;">Resultat</div>
                  <div style="font-size:1.5rem;margin-bottom:6px;">{{STARS}}</div>
                  <div style="font-size:2rem;font-weight:900;color:{{MARGIN_COLOR}};">{{MARGIN_TEXT}}</div>
                  <div style="color:#888;font-size:0.82rem;margin-top:8px;">{{TASKS_DONE}} av {{TASKS_TOTAL}} oppgaver · Frist {{DEADLINE}}</div>
                </td>
              </tr>
            </table>

            <!-- TASKS LIST -->
            <p style="color:#c77dff;font-size:0.82rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin:0 0 14px;">Oppgaver gjort i dag</p>
            {{TASK_LIST}}

            <!-- MESSAGE -->
            <table width="100%" cellpadding="0" cellspacing="0" style="margin:24px 0;">
              <tr>
                <td style="background:#0a1a30;border-radius:12px;padding:18px;border-left:3px solid {{BORDER_COLOR}};">
                  <p style="color:#ccc;font-size:0.9rem;line-height:1.7;margin:0;">{{MOTIVATIONAL_MESSAGE}}</p>
                </td>
              </tr>
            </table>

            <!-- CTA -->
            <table width="100%" cellpadding="0" cellspacing="0">
              <tr>
                <td align="center">
                  <a href="https://stepster.no" style="display:inline-block;background:linear-gradient(135deg,#f9d71c,#ff8c42);color:#1a1a2e;font-weight:800;font-size:1rem;text-decoration:none;padding:14px 36px;border-radius:50px;box-shadow:0 4px 20px rgba(249,215,28,0.3);">
                    Se statistikk ⭐
                  </a>
                </td>
              </tr>
            </table>

          </td>
        </tr>

        <!-- FOOTER -->
        <tr>
          <td style="background:#0d0d1f;border-radius:0 0 20px 20px;padding:20px 30px;border:1px solid #0f3460;border-top:none;text-align:center;">
            <p style="color:#555;font-size:0.78rem;margin:0 0 6px;">Stepster — Din venn i hverdagen</p>
            <p style="color:#555;font-size:0.78rem;margin:0;">
              <a href="https://stepster.no" style="color:#7c3aed;text-decoration:none;">stepster.no</a>
            </p>
          </td>
        </tr>

      </table>
    </td>
  </tr>
</table>

</body>
</html>
